name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Unzip project files
      run: |
        unzip "my project.zip"

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # استخدام أداة Gradle الجاهزة للبناء مباشرة داخل مجلد المشروع
    - name: Setup Gradle and Build
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.2.2

    - name: Build Debug APK
      run: |
        cd "my project"
        gradle assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-app-debug-apk
        path: "my project/app/build/outputs/apk/debug/app-debug.apk"
